name: Lint

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  lint:
    name: Pre-commit & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-

      - name: Run pre-commit hooks (nix flake check)
        run: nix flake check

      - name: Run type check (ty)
        run: nix develop --command ty check
