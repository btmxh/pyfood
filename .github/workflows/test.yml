name: Test

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest packages/dvrptw/tests/ -v
