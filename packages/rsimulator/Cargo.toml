[package]
name = "rsimulator"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
name = "rsimulator"
crate-type = ["cdylib"]

[features]
default = ["simd"]
simd = ["dep:wide"]
bench = []

[dependencies]
pyo3 = "0.27.0"
wide = { version = "1", optional = true }
